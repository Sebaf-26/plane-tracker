services:
  ultrafeeder:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder:latest
    container_name: hydraplanes-ultrafeeder
    restart: unless-stopped
    device_cgroup_rules:
      - "c 189:* rwm"
    ports:
      - "30003:30003"
      - "30104:30104"
    environment:
      LOGLEVEL: error
      TZ: ${TZ:-Europe/Rome}
      READSB_DEVICE_TYPE: rtlsdr
      READSB_RTLSDR_DEVICE: "0"
      READSB_LAT: ${READSB_LAT}
      READSB_LON: ${READSB_LON}
      READSB_ALT: ${READSB_ALT}
      READSB_GAIN: ${READSB_GAIN:-autogain}
      ULTRAFEEDER_HTTPS_PORT: "false"
      TAR1090_DEFAULTCENTERLAT: ${READSB_LAT}
      TAR1090_DEFAULTCENTERLON: ${READSB_LON}
      TAR1090_MESSAGERATEINTITLE: "true"
    volumes:
      - ultrafeeder_data:/opt/adsb
      - /dev/bus/usb:/dev/bus/usb
    tmpfs:
      - /run:exec,size=64M
      - /tmp:size=128M

  backend:
    build:
      context: ./backend
    container_name: hydraplanes-backend
    restart: unless-stopped
    environment:
      ULTRAFEEDER_URL: http://ultrafeeder/data/aircraft.json
      DB_PATH: /data/hydra.db
      RETAIN_MINUTES: "${RETAIN_MINUTES:-10}"
    volumes:
      - ${DB_HOST_PATH:-./data}:/data
    depends_on:
      - ultrafeeder

  frontend:
    build:
      context: ./frontend
      args:
        VITE_LAT: ${READSB_LAT}
        VITE_LON: ${READSB_LON}
    container_name: hydraplanes-frontend
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8090}:80"
    depends_on:
      - ultrafeeder
      - backend

volumes:
  ultrafeeder_data:
